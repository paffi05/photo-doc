name: Tauri Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v1.0.4)"
        required: true
        type: string
      allow_unsigned:
        description: "Allow unsigned build when signing secrets are missing (use only for test tags)"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            target: "x86_64-apple-darwin"
            args: "--target x86_64-apple-darwin"
          - platform: "macos-latest"
            target: "aarch64-apple-darwin"
            args: "--target aarch64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    env:
      # Allow unsigned builds for explicit manual runs or tags like v1.2.3-test.
      ALLOW_UNSIGNED: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.allow_unsigned == 'true') || contains(github.ref_name, '-test') }}
      TAURI_PRIVATE_KEY_RESOLVED: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || secrets.TAURI_PRIVATE_KEY }}
      TAURI_PRIVATE_KEY_PASSWORD_RESOLVED: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || secrets.TAURI_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable (macOS target)
        if: ${{ startsWith(matrix.platform, 'macos') }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Rust stable
        if: ${{ !startsWith(matrix.platform, 'macos') }}
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Show Tauri CLI version
        run: npx tauri --version

      - name: Validate signing configuration
        shell: pwsh
        run: |
          $hasKey = -not [string]::IsNullOrWhiteSpace("${{ env.TAURI_PRIVATE_KEY_RESOLVED }}")
          $hasPass = -not [string]::IsNullOrWhiteSpace("${{ env.TAURI_PRIVATE_KEY_PASSWORD_RESOLVED }}")
          $allowUnsigned = "${{ env.ALLOW_UNSIGNED }}" -eq "true"
          if ($hasKey -and $hasPass) {
            Write-Host "Signing secrets are present."
            exit 0
          }
          if ($allowUnsigned) {
            Write-Warning "Signing secrets missing. Continuing with unsigned build because ALLOW_UNSIGNED=true."
            exit 0
          }
          Write-Error "Missing signing secrets. Configure TAURI_SIGNING_PRIVATE_KEY (or TAURI_PRIVATE_KEY) and TAURI_SIGNING_PRIVATE_KEY_PASSWORD (or TAURI_KEY_PASSWORD), or run workflow_dispatch with allow_unsigned=true for test tags."
          exit 1

      - name: Clean Tauri target (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          if (Test-Path "src-tauri/target") {
            Remove-Item -Recurse -Force "src-tauri/target"
          }

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@action-v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_PRIVATE_KEY_RESOLVED }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_PRIVATE_KEY_PASSWORD_RESOLVED }}
          TAURI_PRIVATE_KEY: ${{ env.TAURI_PRIVATE_KEY_RESOLVED }}
          TAURI_KEY_PASSWORD: ${{ env.TAURI_PRIVATE_KEY_PASSWORD_RESOLVED }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          releaseName: "photo-doc ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}"
          releaseBody: "Automated release for photo-doc."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
