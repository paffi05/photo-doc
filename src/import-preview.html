<!doctype html>
<html lang="en" data-i18n-document-title="import_live_preview_title">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Import Live Preview</title>
    <link rel="stylesheet" href="./import-preview.css" />
    <script type="module" src="./import-preview.js"></script>
  </head>
  <body>
    <main class="preview-root">
      <div id="previewToolbar" class="preview-toolbar" aria-hidden="true">
        <button id="rotateRightBtn" class="preview-toolbar-btn" type="button" aria-label="Rotate right 90 degrees" data-i18n-aria-label="preview.rotate_right">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
            <polyline points="21 3 21 8 16 8"/>
          </svg>
        </button>
        <button id="markBtn" class="preview-toolbar-btn preview-toolbar-btn-accent" type="button" aria-label="Mark edit mode" data-i18n-aria-label="preview.mark_edit_mode">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M15.7 4.9L19.1 8.3L9.1 18.3L5 19.3L6 15.2L15.7 4.9Z"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M13.8 6.8L17.2 10.2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <div id="drawColorPicker" class="draw-color-picker" aria-label="Line color picker" data-i18n-aria-label="preview.line_color_picker">
          <button type="button" class="draw-color-dot active" data-color="white" aria-label="White line color" data-i18n-aria-label="preview.white_line"></button>
          <button type="button" class="draw-color-dot" data-color="red" aria-label="Red line color" data-i18n-aria-label="preview.red_line"></button>
          <button type="button" class="draw-color-dot" data-color="blue" aria-label="Blue line color" data-i18n-aria-label="preview.blue_line"></button>
        </div>
        <div id="drawColorPopover" class="draw-color-popover" hidden>
          <input id="drawCustomColorInput" class="draw-custom-color-input" type="color" />
        </div>
        <button id="clearDrawBtn" class="draw-clear-btn" type="button" aria-label="Clear drawn lines" data-i18n-aria-label="preview.clear_lines">
          <svg class="draw-clear-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M7 7L17 17" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
            <path d="M17 7L7 17" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          </svg>
        </button>
        <div id="drawSaveWrap" class="draw-save-wrap">
          <input id="drawSaveInput" class="draw-save-input" type="text" placeholder="Folder name..." autocomplete="off" data-i18n-placeholder="preview.folder_name_placeholder" />
          <button id="drawSaveDropdownBtn" class="draw-save-dropdown-btn" type="button" aria-label="Show existing folders" data-i18n-aria-label="preview.show_existing_folders" aria-expanded="false" hidden>
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M7 10L12 15L17 10" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div id="drawSaveSuggestions" class="draw-save-suggestions" hidden>
            <ul id="drawSaveSuggestionsList" class="draw-save-suggestions-list"></ul>
          </div>
        </div>
        <button id="drawSaveBtn" class="draw-save-btn" type="button" aria-label="Save drawing" data-i18n-aria-label="preview.save_drawing">Save</button>
      </div>
      <button id="navPrevBtn" class="preview-nav preview-nav-left" type="button" aria-label="Previous image" data-i18n-aria-label="preview.previous_image">
        &#8249;
      </button>
      <img id="previewImage" alt="Live preview" draggable="false" />
      <canvas id="drawCanvas" class="draw-canvas" aria-hidden="true"></canvas>
      <div id="previewLoading" class="preview-loading" aria-hidden="true">
        <div class="preview-spinner" aria-label="Loading image" data-i18n-aria-label="preview.loading_image"></div>
      </div>
      <button id="navNextBtn" class="preview-nav preview-nav-right" type="button" aria-label="Next image" data-i18n-aria-label="preview.next_image">
        &#8250;
      </button>
    </main>
  </body>
</html>
